<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OurMarket</title>

<style>
:root {
  font-size: 14px;
  --green: #1f8f3a;
  --gray: #777;
  --bg: #ffffff;
}

/* GLOBAL */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: #444;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.8rem 1rem;
  border-bottom: 1px solid #ddd;
  background: white;
  position: sticky;
  top: 0;
  z-index: 10;
}

.left-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.back-btn {
  font-size: 18px;
  color: white;
  background: var(--green);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
}

.logo {
  font-size: 1.3rem;
  color: var(--green);
  font-weight: bold;
  letter-spacing: 0.5px;
}

.top-right {
  display: flex;
  gap: 0.5rem;
}

.sell-btn, .login-btn {
  padding: 0.45rem 0.9rem;
  font-size: 0.85rem;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

.sell-btn {
  background: var(--green);
  color: white;
}

.login-btn {
  background: #eaeaea;
}

/* SEARCH */
.search-container {
  display: flex;
  justify-content: center;
  margin: 0.9rem;
}

.search-box {
  display: flex;
  width: 100%;
  max-width: 600px;
  border: 1px solid #ccc;
  border-radius: 30px;
  overflow: hidden;
  background: white;
}

.search-box input {
  flex: 1;
  padding: 0.7rem;
  border: none;
  outline: none;
  font-size: 0.95rem;
}

.search-btn {
  padding: 0 1rem;
  background: var(--green);
  color: white;
  border: none;
  cursor: pointer;
}

/* CATEGORIES */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 0.8rem;
  padding: 0.6rem 1rem;
  scrollbar-width: none;
}

.categories::-webkit-scrollbar {
  display: none;
}

.category {
  font-size: 0.85rem;
  color: #333;
  cursor: pointer;
  white-space: nowrap;
  padding: 5px 10px;
  border-radius: 15px;
  background: #f3f3f3;
  transition: 0.2s;
}

.category.active {
  background: var(--green);
  color: white;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 12px;
}

.product {
  background: #fafafa;
  border-radius: 12px;
  padding: 8px;
  border: 1px solid #ddd;
  cursor: pointer;
  transition: 0.2s;
}

.product:hover {
  transform: scale(1.02);
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.product img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 10px;
}

.product h4 {
  margin: 6px 0 2px;
  font-size: 0.95rem;
  color: var(--green);
}

.product p {
  margin: 0;
  font-size: 0.85rem;
  color: #666;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
  z-index: 999;
}

.hidden { display: none; }

.modal-content {
  background: white;
  width: 100%;
  max-width: 750px;
  border-radius: 14px;
  padding: 12px;
  position: relative;
  max-height: 95vh;
  overflow-y: auto;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  cursor: pointer;
}

.modal img {
  width: 100%;
  max-height: 60vh;
  object-fit: cover;
  border-radius: 12px;
}

/* RESPONSIVE TWEAKS */
@media (max-width: 768px) {
  .products {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  }
}

@media (max-width: 480px) {
  .logo { font-size: 1.1rem; }
  .product img { height: 120px; }
  .search-box input { font-size: 0.85rem; }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="left-top">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <div class="logo">OurMarket</div>
  </div>

  <div class="top-right">
    <button class="sell-btn" onclick="location.href='sell.html'">Sell</button>
    <button class="login-btn" onclick="location.href='login.html'">Login</button>
  </div>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search by name, location or category...">
    <button class="search-btn" onclick="loadProducts()">Go</button>
  </div>
</div>

<div class="categories">
  <div class="category active" onclick="filterCategory('all', this)">All</div>
  <div class="category" onclick="filterCategory('phone', this)">Phones</div>
  <div class="category" onclick="filterCategory('clothes', this)">Clothes</div>
  <div class="category" onclick="filterCategory('car', this)">Cars</div>
  <div class="category" onclick="filterCategory('land', this)">Land</div>
  <div class="category" onclick="filterCategory('others', this)">Others</div>
</div>

<div class="products" id="productList"></div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" id="closeModal">✖</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let currentCategory = "all";
let cache = {};
let loading = false;
const LIMIT = 20;

/* OPTIMIZE IMAGE (Cloudinary) */
function optimizeImage(url) {
  if (!url) return "https://via.placeholder.com/300";
  return url.replace("/upload/", "/upload/w_300,f_auto,q_auto/");
}

/* LOAD PRODUCTS */
async function loadProducts() {
  if (loading) return;
  loading = true;

  const list = document.getElementById("productList");
  const search = document.getElementById("searchInput").value.trim().toLowerCase();

  const cacheKey = currentCategory + search;

  if (cache[cacheKey]) {
    display(cache[cacheKey]);
    loading = false;
    return;
  }

  // skeleton loading
  list.innerHTML = "";
  for (let i = 0; i < 6; i++) {
    const sk = document.createElement("div");
    sk.className = "product";
    sk.innerHTML = `<div style="height:140px;background:#eee;border-radius:10px;"></div>`;
    list.appendChild(sk);
  }

  try {
    let url = `https://feedserver-7.onrender.com/api/products?category=${currentCategory}&limit=${LIMIT}`;
    
    const res = await fetch(url);
    const data = await res.json();

    const filtered = data.filter(p => {
      const name = (p.name || "").toLowerCase();
      const location = (p.location || "").toLowerCase();
      return name.includes(search) || location.includes(search);
    });

    cache[cacheKey] = filtered;
    display(filtered);

  } catch (err) {
    list.innerHTML = "<p style='padding:10px;color:red;'>Failed to load products</p>";
  }

  loading = false;
}

/* DISPLAY */
function display(products) {
  const list = document.getElementById("productList");
  list.innerHTML = "";

  if (!products.length) {
    list.innerHTML = "<p style='padding:10px;'>No products found</p>";
    return;
  }

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img loading="lazy" src="${optimizeImage(p.images?.[0])}">
      <h4>${p.name || "No name"}</h4>
      <p>${p.priceText || ""}</p>
    `;

    div.onclick = () => openProduct(p);
    list.appendChild(div);
  });
}

/* OPEN PRODUCT */
function openProduct(p) {
  document.getElementById("modalBody").innerHTML = `
    <img src="${optimizeImage(p.images?.[0])}">
    <h3>${p.name}</h3>
    <p><b>Price:</b> ${p.priceText}</p>
    <p><b>Phone:</b> ${p.phone || ""}</p>
    <p><b>Location:</b> ${p.location || ""}</p>
  `;

  document.getElementById("modal").classList.remove("hidden");
}

/* CLOSE */
document.getElementById("closeModal").onclick = () => {
  document.getElementById("modal").classList.add("hidden");
};

document.getElementById("modal").onclick = (e) => {
  if (e.target.id === "modal") {
    document.getElementById("modal").classList.add("hidden");
  }
};

/* CATEGORY */
function filterCategory(category, el) {
  document.querySelectorAll(".category").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  currentCategory = category;
  loadProducts();
}

/* SEARCH (DEBOUNCE) */
document.getElementById("searchInput").addEventListener("input", () => {
  clearTimeout(window.t);
  window.t = setTimeout(loadProducts, 400);
});

/* INITIAL LOAD */
loadProducts();
</script>
</body>
</html>
