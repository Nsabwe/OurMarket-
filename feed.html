<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
:root { font-size: 14px; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
  color: #555;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid gold;
}

.left-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* BACK BUTTON */
.back-btn {
  font-size: 18px;
  color: white;
  background: green;
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

.logo { font-size: 1.2rem; color: green; font-weight: bold; }

.top-right { display: flex; gap: 0.5rem; }

.sell-btn, .login-btn {
  padding: 0.4rem 0.7rem;
  font-size: 0.8rem;
  border-radius: 15px;
  border: none;
  cursor: pointer;
}

.sell-btn { background: green; color: white; }
.login-btn { background: gold; }

/* SEARCH */
.search-container {
  display: flex;
  justify-content: center;
  margin: 0.8rem;
}

.search-box {
  display: flex;
  width: 95%;
  max-width: 500px;
  border: 1px solid gold;
  border-radius: 25px;
  overflow: hidden;
}

.search-box input {
  flex: 1;
  padding: 0.5rem;
  border: none;
  outline: none;
}

.search-btn {
  padding: 0 0.8rem;
  background: green;
  color: white;
  border: none;
}

/* CATEGORIES */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 1rem;
  padding: 0.5rem 1rem;
}

.category {
  font-size: 0.8rem;
  color: green;
  cursor: pointer;
}

.category.active {
  border-bottom: 2px solid gold;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  padding: 10px;
}

.product {
  background: #f5f5f5;
  border-radius: 10px;
  padding: 8px;
  border: 1px solid gold;
}

.product img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
}

.product h4 { margin: 5px 0; color: green; }

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 15px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  position: relative;
}

.modal-content img {
  width: 100%;
  max-height: 250px;
  object-fit: cover;
  border-radius: 10px;
}

.modal-content h2 {
  color: green;
  margin: 10px 0;
}

.modal-content p {
  margin: 5px 0;
}

/* CLOSE X */
.close-btn {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 18px;
  color: red;
  cursor: pointer;
}

/* MOBILE */
@media (max-width: 500px) {
  .modal-content {
    width: 95%;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="left-top">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <div class="logo">OurMarket</div>
  </div>

  <div class="top-right">
    <button class="sell-btn" onclick="location.href='sell.html'">Sell</button>
    <button class="login-btn" onclick="location.href='login.html'">Login</button>
  </div>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products...">
    <button class="search-btn" onclick="loadProducts()">Go</button>
  </div>
</div>

<div class="categories">
  <div class="category active" onclick="filterCategory('all', this)">All</div>
  <div class="category" onclick="filterCategory('phone', this)">Phone</div>
  <div class="category" onclick="filterCategory('clothes', this)">Clothes</div>
  <div class="category" onclick="filterCategory('car', this)">Car</div>
  <div class="category" onclick="filterCategory('land', this)">Land</div>
  <div class="category" onclick="filterCategory('others', this)">Others</div>
</div>

<div class="products" id="productList"></div>

<!-- PRODUCT MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">✖</span>
    <img id="modalImg">
    <h2 id="modalName"></h2>
    <p id="modalPrice"></p>
    <p id="modalPhone"></p>
    <p id="modalLocation"></p>
  </div>
</div>

<script>
let currentCategory = "all";

// LOAD FROM MONGODB
async function loadProducts() {
  const search = document.getElementById("searchInput").value;

  // ✅ FIX: use backticks + encode values
  let url = `https://feedserver-1.onrender.com/products?category=${encodeURIComponent(currentCategory)}`;

  if (search) {
    url += `&search=${encodeURIComponent(search)}`;
  }

  try {
    const res = await fetch(url);

    // ✅ handle bad responses
    if (!res.ok) {
      throw new Error("Server error");
    }

    const data = await res.json();
    display(data);

  } catch (err) {
    console.error("Failed to load products:", err);
    document.getElementById("productList").innerHTML =
      "<p style='text-align:center;color:red;'>Failed to load products</p>";
  }
}

// DISPLAY PRODUCTS
function display(products) {
  const list = document.getElementById("productList");
  list.innerHTML = "";

  // ✅ handle empty results
  if (!products || products.length === 0) {
    list.innerHTML = "<p style='text-align:center;'>No products found</p>";
    return;
  }

  products.forEach(p => {
    list.innerHTML += `
      <div class="product">
        <img src="${p.image}" onclick='openModal(${JSON.stringify(p)})'>
        <h4>${p.name}</h4>
        <p>Price: ${p.price}</p>
      </div>
    `;
  });
}

// CATEGORY
function filterCategory(category, el) {
  document.querySelectorAll(".category").forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  currentCategory = category;
  loadProducts();
}

// LIVE SEARCH (FAST)
let timeout;
document.getElementById("searchInput").addEventListener("input", function () {
  clearTimeout(timeout);
  timeout = setTimeout(loadProducts, 300);
});

// MODAL
function openModal(p) {
  document.getElementById("productModal").style.display = "flex";

  document.getElementById("modalImg").src = p.image;
  document.getElementById("modalName").innerText = p.name;
  document.getElementById("modalPrice").innerText = "Price: " + p.price;
  document.getElementById("modalPhone").innerText = "Phone: " + p.phone;
  document.getElementById("modalLocation").innerText = "Location: " + p.location;
}

function closeModal() {
  document.getElementById("productModal").style.display = "none";
}

// INITIAL LOAD
loadProducts();
</script>

</body>
</html>
