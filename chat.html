<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OurChat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ===== GLOBAL ===== */
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body { background:#f0f2f5; min-height:100vh; transition:0.3s; }
button{cursor:pointer;}

/* ===== SIDEBAR ===== */
#sidebar { position:fixed; left:0; top:0; width:220px; height:100vh; background:#fff; border-right:1px solid #ccc; overflow-y:auto; padding:10px; transition: transform 0.3s ease; z-index:15; }
#sidebar h3 { margin-bottom:10px; font-size:1.1rem; color:#333; }
.user-btn{ width:100%; margin-bottom:5px; border:none; padding:6px; border-radius:6px; text-align:left; background:#fff; cursor:pointer; position:relative; }
.user-btn:hover{background:#e1e1e1;}
.user-dot{ width:10px; height:10px; border-radius:50%; position:absolute; left:5px; top:5px; }
.user-badge{ position:absolute; right:5px; top:5px; width:18px; height:18px; border-radius:50%; font-size:12px; text-align:center; line-height:18px; color:white; }

/* ===== TOP BAR ===== */
.top-bar { height:60px; background:#1877f2; color:white; display:flex; align-items:center; justify-content:space-between; padding:0 15px; font-weight:bold; font-size:1.2rem; position:fixed; top:0; left:220px; width:calc(100%-220px); z-index:20; transition: left 0.3s, width 0.3s; }
#sidebarToggle{ display:none; cursor:pointer; }

/* ===== CHAT HEADER ===== */
#chatHeader { position:fixed; top:60px; left:220px; width:calc(100%-220px); background:#e4e6eb; padding:10px 15px; z-index:19; font-size:0.9rem; display:flex; justify-content:space-between; flex-wrap:wrap; transition:left 0.3s, width 0.3s; }

/* ===== CONTENT AREA ===== */
.content-area { position:fixed; top:120px; bottom:160px; left:220px; width:calc(100%-220px); overflow-y:auto; background:white; padding:15px; transition:left 0.3s, width 0.3s; }

/* ===== MESSAGE ===== */
.message-container { display:flex; gap:10px; margin-bottom:12px; opacity:0; transform:translateY(20px); animation: fadeInUp 0.3s forwards; position:relative; }
@keyframes fadeInUp{ to{opacity:1; transform:translateY(0);} }
.message-container.user{ flex-direction:row-reverse; }
.message{ padding:10px 14px; border-radius:18px; max-width:75%; background:#e4e6eb; word-wrap:break-word; box-shadow:0 2px 6px rgba(0,0,0,0.1); font-size:0.95rem; position:relative; }
.message.user{ background:#DCF8C6; }
.message-header{ font-size:0.75rem; color:#555; margin-bottom:4px; }
.status{ font-size:0.8rem; position:absolute; bottom:-16px; right:8px; }

/* ===== BOTTOM BAR ===== */
.bottom-bar { position:fixed; bottom:0; left:220px; width:calc(100%-220px); background:#f0f2f5; padding:10px 15px; display:flex; flex-direction:column; gap:8px; transition:left 0.3s, width 0.3s; }
textarea{ width:100%; border-radius:25px; padding:10px 14px; border:none; resize:none; font-size:0.95rem; }
.input-container{ display:flex; gap:6px; align-items:center; }
.send-btn{ background:#1877f2; color:white; border:none; border-radius:50%; padding:12px; cursor:pointer; transition:0.2s; }
.send-btn:hover{ background:#155db2; }
.bottom-buttons{ display:flex; gap:10px; }
.bottom-buttons button{ border:none; background:white; border-radius:50%; padding:10px; cursor:pointer; box-shadow:0 1px 4px rgba(0,0,0,0.1); transition:0.2s; }
.bottom-buttons button:hover{ background:#f0f2f5; }

/* ===== MODALS ===== */
.modal{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.6); justify-content:center; align-items:center; z-index:30; }
.modal-content{ background:white; padding:20px; border-radius:12px; width:90%; max-width:480px; position:relative; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
.close-btn{ position:absolute; top:10px; right:10px; background:red; color:white; border:none; padding:5px 10px; border-radius:6px; cursor:pointer; }

/* ===== VOICE ===== */
.waveform-container{ display:flex; gap:2px; margin-top:5px; }
.waveform-bar{ width:3px; background:#1877f2; height:10px; border-radius:2px; transition:0.05s; }

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
    #sidebar{ transform:translateX(-100%); }
    #sidebar.active{ transform:translateX(0); }
    #sidebarToggle{ display:inline-block; margin-right:10px; }
    .top-bar,#chatHeader,.content-area,.bottom-bar{ left:0; width:100%; }
    .sidebar-active .top-bar,.sidebar-active #chatHeader,.sidebar-active .content-area,.sidebar-active .bottom-bar{ left:220px; width:calc(100%-220px); }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>Users</h3>
  <div id="userListContainer"></div>
  <hr>
  <button onclick="selectChat(null)">Public Chat</button>
</div>

<!-- TOP BAR -->
<div class="top-bar">
  <i class="fa fa-bars" id="sidebarToggle"></i>
  <span id="topBarTitle">OurChat</span>
  <i class="fa-solid fa-user" onclick="openProfileModal()"></i>
</div>

<!-- CHAT HEADER -->
<div id="chatHeader">
  <div id="onlineCount">0 Online</div>
  <div id="typingStatus"></div>
</div>

<!-- CHAT CONTENT -->
<div class="content-area" id="contentArea"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="input-container">
    <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn"><i class="fa fa-paper-plane"></i></button>
  </div>
  <div class="bottom-buttons">
    <button onclick="openFilePicker()"><i class="fa fa-paperclip"></i></button>
    <button onclick="toggleRecording()"><i class="fa fa-microphone"></i></button>
  </div>
  <div id="voicePreviewContainer"></div>
</div>

<!-- PROFILE MODAL -->
<div class="modal" id="profileModal">
  <div class="modal-content">
    <button class="close-btn" onclick="profileModal.style.display='none'">X</button>
    <h3>Create Account</h3>
    <input type="text" id="userNameInput" placeholder="Name"><br><br>
    <input type="text" id="userPhoneInput" placeholder="Phone"><br><br>
    <input type="file" id="profileFileInput"><br><br>
    <button onclick="saveProfile()">Create</button>
  </div>
</div>

<input type="file" id="fileInput" style="display:none;">t.on("typing", (senderId)=>{ typingStatus.textContent="Typing..."; });
socket.on("stopTyping", ()=>{ typingStatus.textContent=""; });
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
// =================== SOCKET.IO ===================
const socket = io("https://chacha2004-20.onrender.com");

// DOM Elements
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('sidebarToggle');
const contentArea = document.getElementById("contentArea");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const typingStatus = document.getElementById("typingStatus");
const topBarTitle = document.getElementById("topBarTitle");
const profileModal = document.getElementById("profileModal");
const fileInput = document.getElementById("fileInput");
const userListContainer = document.getElementById("userListContainer");

// STATE
let currentUser = null;
let targetUser = null;
let typingTimer, mediaRecorder, audioChunks=[], recording=false;

// SIDEBAR TOGGLE
toggleBtn.addEventListener('click', ()=>{ 
    sidebar.classList.toggle('active'); 
    document.body.classList.toggle('sidebar-active'); 
});

// =================== ACCOUNT ===================
function openProfileModal(){ profileModal.style.display='flex'; }

async function saveProfile(){
    const name = document.getElementById("userNameInput").value.trim();
    const phone = document.getElementById("userPhoneInput").value.trim();
    const file = document.getElementById("profileFileInput").files[0];
    if(!name || !phone || !file) return alert("All fields required!");
    
    const form = new FormData(); 
    form.append("name", name); 
    form.append("phone", phone); 
    form.append("profile", file);

    const res = await fetch("https://chacha2004-20.onrender.com/account", { method: "POST", body: form });
    const savedUser = await res.json();
    if(res.status !== 200) return alert(savedUser.error || "Failed");

    currentUser = savedUser;
    localStorage.setItem("ourchat_user", JSON.stringify(currentUser));
    profileModal.style.display='none';
    socket.emit("login", currentUser._id);
    loadUsers(); 
    loadMessages(null);
}

// Load user if saved
(function(){
    const storedUser = localStorage.getItem("ourchat_user");
    if(storedUser){ 
        currentUser = JSON.parse(storedUser); 
        socket.emit("login", currentUser._id); 
        loadUsers(); 
        loadMessages(null);
    } else openProfileModal();
})();

// =================== USERS ===================
async function loadUsers(){
    const users = await fetch("https://chacha2004-20.onrender.com/users").then(r => r.json());
    userListContainer.innerHTML = "";
    users.forEach(u => {
        if(u._id === currentUser._id) return;
        const btn = document.createElement("button");
        btn.className = "user-btn"; 
        btn.textContent = u.name;
        
        const dot = document.createElement("span"); 
        dot.className = "user-dot"; 
        dot.style.background = u.isOnline ? "#2ecc71" : "#bbb"; 
        btn.appendChild(dot);

        if(u.unreadCount > 0){ 
            const b = document.createElement("span"); 
            b.className = "user-badge"; 
            b.textContent = u.unreadCount; 
            b.style.background="red"; 
            btn.appendChild(b);
        }

        btn.onclick = ()=>{ 
            targetUser = u; 
            loadMessages(u._id); 
            topBarTitle.textContent = u.name;
        }
        userListContainer.appendChild(btn);
    });
}

// =================== MESSAGES ===================
async function loadMessages(receiverId){
    const url = `https://chacha2004-20.onrender.com/messages/${currentUser._id}`;
    const messages = await fetch(url).then(r => r.json());
    contentArea.innerHTML = "";

    messages.forEach(m => {
        const isUser = m.senderId._id === currentUser._id;
        if(receiverId && m.receiverId && m.receiverId !== receiverId && !isUser) return;
        addMessage(m, isUser);
    });

    if(receiverId) socket.emit("markSeen", { senderId: receiverId, receiverId: currentUser._id });
}

function addMessage(msg, isUser){
    const c = document.createElement("div"); 
    c.className = "message-container" + (isUser ? " user" : ""); 
    c.dataset.id = msg._id;

    const m = document.createElement("div"); 
    m.className = "message" + (isUser ? " user" : "");

    const h = document.createElement("div"); 
    h.className = "message-header"; 
    h.textContent = `${msg.senderId.name} • ${new Date(msg.timestamp).toLocaleTimeString()}`;
    m.appendChild(h);

    if(msg.type === "text") m.append(msg.content);
    if(msg.type === "image"){ 
        const i = document.createElement("img"); 
        i.src = msg.content; 
        i.style.maxWidth = "220px"; 
        m.appendChild(i);
    }
    if(msg.type === "file"){ 
        const a = document.createElement("a"); 
        a.href = msg.content; 
        a.download = msg.fileName; 
        a.textContent = "📄 " + msg.fileName; 
        m.appendChild(a);
    }
    if(msg.type === "voice"){ 
        const a = document.createElement("audio"); 
        a.controls = true; 
        a.src = msg.content; 
        m.appendChild(a);
    }

    const status = document.createElement("div"); 
    status.className = "status";
    status.textContent = msg.status === "sent" ? "" : msg.status === "delivered" ? "🙂" : "😲";
    m.appendChild(status);

    m.ondblclick = ()=>{ 
        if(confirm("Delete this message?")){ 
            socket.emit("deleteMessage", { messageId: msg._id, userId: currentUser._id }); 
            m.remove(); 
        }
    };

    c.appendChild(m); 
    contentArea.appendChild(c); 
    contentArea.scrollTop = contentArea.scrollHeight;
}

// =================== SEND MESSAGE ===================
async function sendMessage(){
    if(!currentUser) return alert("Set profile first");
    const receiverId = targetUser ? targetUser._id : null;
    const text = messageInput.value.trim(); 
    if(!text) return;

    const msg = { senderId: currentUser._id, receiverId, type: "text", content: text, timestamp: new Date() };
    socket.emit("sendMessage", msg); 
    messageInput.value = "";
}
sendBtn.onclick = sendMessage;

// =================== TYPING ===================
messageInput.oninput = ()=>{
    if(!currentUser) return;
    const receiverId = targetUser ? targetUser._id : null;
    socket.emit("typing", { senderId: currentUser._id, receiverId });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(()=>socket.emit("stopTyping", { receiverId }), 1000);
};

// =================== FILE UPLOAD ===================
function openFilePicker(){ fileInput.click(); }

fileInput.onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const receiverId = targetUser ? targetUser._id : null;

    const form = new FormData();
    form.append("file", file);
    const res = await fetch("https://chacha2004-20.onrender.com/upload", { method: "POST", body: form });
    const data = await res.json();
    if(!res.ok) return alert(data.error || "Upload failed");

    const type = file.type.startsWith("image/") ? "image" : "file";
    const msg = { senderId: currentUser._id, receiverId, type, content: data.url, fileName: file.name, timestamp: new Date() };
    socket.emit("sendMessage", msg);
    fileInput.value = "";
};

// =================== VOICE RECORDING ===================
async function toggleRecording(){
    if(recording){
        mediaRecorder.stop();
    } else {
        const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async ()=>{
            const audioBlob = new Blob(audioChunks, { type:'audio/webm' });
            const receiverId = targetUser ? targetUser._id : null;
            const form = new FormData();
            form.append("file", audioBlob);
            const res = await fetch("https://chacha2004-20.onrender.com/upload", { method:"POST", body: form });
            const data = await res.json();
            if(!res.ok) return alert(data.error || "Voice upload failed");
            const msg = { senderId: currentUser._id, receiverId, type: "voice", content: data.url, timestamp: new Date() };
            socket.emit("sendMessage", msg);
        };
        mediaRecorder.start();
    }
    recording = !recording;
}

// =================== SOCKET EVENTS ===================
socket.on("newMessage", (msg)=>{
    const isUser = msg.senderId._id === currentUser._id;
    if(targetUser && msg.receiverId && msg.receiverId !== targetUser._id && !isUser) return;
    addMessage(msg, isUser);
});
socket.on("messageDeleted", (msgId)=>{ const el=document.querySelector(`[data-id="${msgId}"]`); if(el) el.remove(); });
socket.on("reactionUpdate", ()=>{});
socket.on("onlineUsers", loadUsers);
socket.on("typing", ()=>{ typingStatus.textContent="Typing..."; });
socket.on("stopTyping", ()=>{ typingStatus.textContent=""; });
</script>
</body>
</html>
